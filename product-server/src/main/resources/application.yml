server:
  port: 8085

spring:
  application:
    name: product-server
  datasource:
    url: jdbc:mysql://mysql-product:3306/productdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: productuser
    password: productpass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: redis
      port: 6379

kafka:
  bootstrap-servers: kafka:9092
