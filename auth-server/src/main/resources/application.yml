server:
  port: 8088

spring:
  application:
    name: auth-server
  datasource:
    url: jdbc:mysql://mysql-auth:3306/authdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: authuser
    password: authpass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: msa-practice-auth-server-jwt-secret-key-must-be-long-enough-for-hs256
  expiration: 3600000  # 1 hour
