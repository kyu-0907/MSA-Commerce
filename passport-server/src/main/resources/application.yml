server:
  port: 8081

spring:
  application:
    name: passport-server
  datasource:
    url: jdbc:mysql://mysql_passport_db:3306/passportdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: passportuser
    password: passportpass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: redis
      port: 6379

jwt:
  secret: msa-practice-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 3600000  # 1 hour in milliseconds

kafka:
  bootstrap-servers: kafka:9092
