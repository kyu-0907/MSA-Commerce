server:
  port: 8087

spring:
  application:
    name: payment-server
  datasource:
    url: jdbc:mysql://mysql-payment:3306/paymentdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: paymentuser
    password: paymentpass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: redis
      port: 6379

kafka:
  bootstrap-servers: kafka:9092
