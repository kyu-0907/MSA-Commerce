server:
  port: 8084

spring:
  application:
    name: batch-server
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
  datasource:
    url: jdbc:mysql://mysql_batch_db:3306/batchdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: batchuser
    password: batchpass
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: redis
      port: 6379

kafka:
  bootstrap-servers: kafka:9092

management:
  endpoints:
    web:
      exposure:
        include: health,info
