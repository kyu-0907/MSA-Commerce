server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-server
          uri: http://auth-server:8081
          predicates:
            - Path=/auth/**

        - id: batch-elastic
          uri: http://batch-elastic:8082
          predicates:
            - Path=/api/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,routes
  endpoint:
    health:
      show-details: always
