server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-server
          uri: http://auth-server:8081
          predicates:
            - Path=/auth/**

        - id: search-server
          uri: http://search-server:8083
          predicates:
            - Path=/api/search/**

        - id: batch-server
          uri: http://batch-server:8084
          predicates:
            - Path=/api/batch/**

  data:
    redis:
      host: redis
      port: 6379

kafka:
  bootstrap-servers: kafka:9092

management:
  endpoints:
    web:
      exposure:
        include: health,info,routes
  endpoint:
    health:
      show-details: always
