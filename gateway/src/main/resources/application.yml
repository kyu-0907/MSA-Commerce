server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: passport-server
          uri: http://passport-server:8081
          predicates:
            - Path=/auth/**

        - id: search-server
          uri: http://search-server:8083
          predicates:
            - Path=/api/search/**

        - id: batch-server
          uri: http://batch-server:8084
          predicates:
            - Path=/api/batch/**

        - id: product-server
          uri: http://product-server:8085
          predicates:
            - Path=/api/products/**

        - id: order-server
          uri: http://order-server:8086
          predicates:
            - Path=/api/orders/**

        - id: payment-server
          uri: http://payment-server:8087
          predicates:
            - Path=/api/payments/**

        - id: auth-server
          uri: http://auth-server:8088
          predicates:
            - Path=/api/auth/**

        - id: push-server
          uri: http://push-server:8089
          predicates:
            - Path=/api/push/**

  data:
    redis:
      host: redis
      port: 6379

kafka:
  bootstrap-servers: kafka:9092

management:
  endpoints:
    web:
      exposure:
        include: health,info,routes
  endpoint:
    health:
      show-details: always
